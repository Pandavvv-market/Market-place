<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSS Active Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <header class="bg-gray-800 border-b border-gray-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <h1 class="text-2xl font-bold text-indigo-400 uppercase tracking-wider">PSS Open Market</h1>
            <div class="flex gap-4">
                <div class="px-4 py-2 rounded bg-indigo-600 text-white font-medium flex items-center gap-2">🏪 Active Shop Listings</div>
                <button onclick="checkPasswordAndOpenModal()" class="px-4 py-2 rounded bg-emerald-600 hover:bg-emerald-500 text-white font-bold transition-colors">+ Post a Listing</button>
            </div>
        </div>
    </header>

    <div id="formModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-xl w-full max-w-md p-6 shadow-2xl relative">
            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl font-bold">&times;</button>
            <h2 class="text-xl font-bold text-indigo-400 mb-4">Create New Market Offer</h2>
            
            <form id="submissionForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Gear Item Name</label>
                    <input type="text" id="form-itemName" required placeholder="e.g. Laser Rifle" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Base Stat</label>
                    <input type="text" id="form-baseStat" required placeholder="e.g. Weapon, HP, Engine" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Sidestat Roll</label>
                    <input type="text" id="form-sidestat" required placeholder="e.g. +2.4 Attack" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Price / Cost</label>
                    <input type="text" id="form-price" required placeholder="e.g. 500 Bux" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">In-Game Captain Name</label>
                    <input type="text" id="form-seller" required placeholder="Your username" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 rounded transition-colors shadow-lg">Publish to Live Board</button>
            </form>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-4 md:p-6">
        <section id="view-market" class="space-y-6">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col md:flex-row gap-4">
                <input type="text" id="market-search" oninput="filterMarket()" placeholder="Search active shop inventory ledger..." class="bg-gray-900 border border-gray-600 rounded px-4 py-2 w-full focus:outline-none focus:border-indigo-500 text-white">
            </div>

            <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700 shadow-lg">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-700 text-gray-300 border-b border-gray-600">
                            <th class="p-4 font-semibold text-sm">Item Name</th>
                            <th class="p-4 font-semibold text-sm">Base Stat</th>
                            <th class="p-4 font-semibold text-sm">Available Variants (Sidestat | Price | Seller)</th>
                        </tr>
                    </thead>
                    <tbody id="market-table-body" class="divide-y divide-gray-700 text-sm"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        const MARKET_PASSWORD = "0302"; 
        const githubUser = "Pandavvv-market";
        const githubRepo = "Market-place";
        
        // PASTE YOUR GENERATED GITHUB PERSONAL TOKEN INSIDE THESE QUOTES:
        const GITHUB_TOKEN = "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";

        // METHOD 1: YOUR PERSONAL HAND-WRITTEN INVENTORY BACKEND
        const masterGearList = [
            { name: "Laser Rifle", slot: "Weapon", baseStat: "Weapon", sideBonus: "+0.5", sideStat: "Attack", price: "400 Bux", seller: "Pandavvv" },
            { name: "Combat Helmet", slot: "Head", baseStat: "HP", sideBonus: "+0.2", sideStat: "Attack", price: "150 Bux", seller: "Pandavvv" }
        ];

        let externalUserListings = []; 

        function checkPasswordAndOpenModal() {
            const userInput = prompt("Enter the Secret Seller Password to access the submission form:");
            if (userInput === MARKET_PASSWORD) {
                toggleModal(true);
            } else if (userInput !== null) {
                alert("Incorrect Password! Access denied.");
            }
        }

        function toggleModal(show) {
            document.getElementById('formModal').classList.toggle('hidden', !show);
            if(!show) document.getElementById('submissionForm').reset();
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Uploading to Database...";
            btn.disabled = true;

            const payload = {
                itemName: document.getElementById('form-itemName').value.trim(),
                baseStat: document.getElementById('form-baseStat').value.trim(),
                sidestat: document.getElementById('form-sidestat').value.trim(),
                price: document.getElementById('form-price').value.trim(),
                seller: document.getElementById('form-seller').value.trim(),
                datePosted: "2026-07-01"
            };

            const fileName = `shop-${payload.seller.replace(/[^a-zA-Z0-9]/g, '')}-${Date.now()}.json`;
            const url = `https://api.github.com/repos/${githubUser}/${githubRepo}/contents/listings/${fileName}`;

            try {
                const response = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Add item listing via custom in-site modal`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))))
                    })
                });

                if (response.ok) {
                    alert("Listing posted successfully!");
                    toggleModal(false);
                    fetchCombinedRegistry();
                } else {
                    const errData = await response.json();
                    alert("Database Error: " + errData.message);
                }
            } catch (err) {
                alert("Network connectivity failure.");
                console.error(err);
            } finally {
                btn.innerText = "Publish to Live Board";
                btn.disabled = false;
            }
        }

        async function fetchCombinedRegistry() {
            const tbody = document.getElementById('market-table-body');
            tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-400 animate-pulse">Scanning database registry...</td></tr>`;
            
            try {
                const url = `https://api.github.com/repos/${githubUser}/${githubRepo}/contents/listings`;
                const response = await fetch(url);
                const files = await response.json();
                
                const activeListingFiles = Array.isArray(files) ? files.filter(f => f.name.endsWith('.json') && f.name !== 'TEMPLATE.json') : [];
                
                if (activeListingFiles.length > 0) {
                    const fetchPromises = activeListingFiles.map(file => fetch(file.download_url).then(res => res.json()));
                    externalUserListings = await Promise.all(fetchPromises);
                } else {
                    externalUserListings = [];
                }
            } catch (err) {
                externalUserListings = [];
            }
            
            const combinedData = [...masterGearList, ...externalUserListings.map(item => ({
                name: item.itemName,
                baseStat: item.baseStat || "N/A",
                sideBonus: "", 
                sideStat: item.sidestat,
                price: item.price,
                seller: item.seller
            }))];

            displayMarketListings(combinedData);
        }

        function displayMarketListings(listings) {
            const tbody = document.getElementById('market-table-body');
            if(listings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">No items found.</td></tr>`;
                return;
            }
            
            const grouped = {};
            listings.forEach(item => {
                if (!item.name) return;
                if (!grouped[item.name]) {
                    grouped[item.name] = { name: item.name, baseStat: item.baseStat, variants: [] };
                }
                grouped[item.name].variants.push({
                    sideBonus: item.sideBonus || "",
                    sideStat: item.sideStat || "",
                    price: item.price,
                    seller: item.seller
                });
            });

            tbody.innerHTML = Object.values(grouped).map(group => `
                <tr class="hover:bg-gray-700/30 transition-colors border-b border-gray-700/50">
                    <td class="p-4 font-bold text-white align-top w-1/4">${group.name}</td>
                    <td class="p-4 text-gray-400 align-top w-1/4">${group.baseStat}</td>
                    <td class="p-2 w-1/2">
                        <div class="space-y-2 my-2">
                            ${group.variants.map(v => `
                                <div class="bg-gray-900/50 border border-gray-700 rounded-lg p-3 flex flex-wrap items-center justify-between gap-2">
                                    <div class="flex items-center gap-4">
                                        <span class="text-emerald-400 font-medium">${v.sideBonus} ${v.sideStat}</span>
                                        <span class="text-gray-500">|</span>
                                        <span class="${v.price === 'SOLD' ? 'text-rose-400 line-through' : 'text-amber-400 font-bold'}">${v.price}</span>
                                        <span class="text-gray-500 hidden sm:inline">|</span>
                                        <span class="text-gray-400 font-mono text-xs hidden sm:inline">${v.seller}</span>
                                    </div>
                                    <a href="https://discord.com/users" target="_blank" class="text-xs px-2.5 py-1 rounded bg-indigo-600 hover:bg-indigo-500 text-white font-medium shadow">Contact</a>
                                </div>
                            `).join('')}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filterMarket() {
            const query = document.getElementById('market-search').value.toLowerCase();
            const combined = [...masterGearList, ...externalUserListings.map(item => ({
                name: item.itemName, baseStat: item.baseStat || "N/A", sideBonus: "", sideStat: item.sidestat, price: item.price, seller: item.seller
            }))];
            const filtered = combined.filter(item => (item.name && item.name.toLowerCase().includes(query)) || (item.sideStat && item.sideStat.toLowerCase().includes(query)));
            displayMarketListings(filtered);
        }

        fetchCombinedRegistry();
    </script>
</body>
</html>
